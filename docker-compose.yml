services:
  command-center:
    build: .
    ports:
      - "5100:5100"
    environment:
      - HOST=0.0.0.0
      - PORT=5100
      - COMMAND_CENTER_DATA=/data
      # Tell the scanner where host project dirs are mounted (comma-separated).
      # Needed because Docker HOME differs from the host HOME encoded in session keys.
      # - EXTRA_PROJECT_DIRS=/home/youruser/dev/projects
      # On Docker Desktop for Mac/Windows, uncomment to enable file polling:
      # - CHOKIDAR_USEPOLLING=1
    volumes:
      - ~/.claude:/home/node/.claude:ro
      # Mount project dirs so the scanner can match session keys to real paths.
      # Without this, hyphenated project names decode incorrectly.
      # Adjust the source path to match your project directory location.
      - ~/dev/projects:/home/tron/dev/projects:ro
      - command-center-data:/data
    restart: unless-stopped

volumes:
  command-center-data:
